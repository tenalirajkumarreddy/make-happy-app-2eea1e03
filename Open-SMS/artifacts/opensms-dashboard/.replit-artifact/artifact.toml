kind = "web"
previewPath = "/"
title = "OpenSMS Dashboard"
version = "1.0.0"
id = "artifacts/opensms-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18448

[services.development]
run = "pnpm --filter @workspace/opensms-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opensms-dashboard", "run", "build" ]
publicDir = "artifacts/opensms-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18448"
BASE_PATH = "/"
